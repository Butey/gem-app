<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель — Энциклопедия камней</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-glass.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script>
        // Загрузка сохранённой темы
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });
    </script>
    <style>
        /* Стили для страницы входа */
        .admin-login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .admin-login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
        }
        
        .admin-login-title {
            text-align: center;
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .admin-login-subtitle {
            text-align: center;
            margin: 0 0 2rem 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        
        .admin-login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        
        .admin-login-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--search-border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--search-bg);
            color: var(--search-text);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .admin-login-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--card-hover);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .admin-login-input::placeholder {
            color: var(--text-muted);
        }
        
        .admin-login-button {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        
        .admin-login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        .admin-login-button:active {
            transform: translateY(0);
        }
        
        .flash-messages {
            margin-bottom: 1.5rem;
        }
        
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }
        
        .flash.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        
        .flash.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
        
        .flash.warning {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }
        
        .back-to-site {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .back-to-site:hover {
            color: var(--accent-primary);
        }
        
        /* Плавающий переключатель тем */
        .theme-toggle-floating {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            padding: 0;
            z-index: 1000;
        }
        
        .theme-toggle-floating:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-lg);
            transform: scale(1.1);
        }
        
        .theme-toggle-icon {
            font-size: 1.25rem;
            line-height: 1;
        }
    </style>
    <script>
        // Переключение темы
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const html = document.documentElement;
            
            themeToggle.addEventListener('click', function() {
                const currentTheme = html.getAttribute('data-theme') || 'dark';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                if (newTheme === 'light') {
                    html.setAttribute('data-theme', 'light');
                    themeIcon.textContent = '☀️';
                } else {
                    html.removeAttribute('data-theme');
                    themeIcon.textContent = '🌙';
                }
                
                localStorage.setItem('theme', newTheme);
            });
        });
    </script>
</head>
<body>
    <button class="theme-toggle-floating" id="theme-toggle" title="Переключить тему" aria-label="Переключить тему">
        <span class="theme-toggle-icon" id="theme-icon">🌙</span>
    </button>
    
    <div class="admin-login-page">
        <div class="admin-login-card">
            <h1 class="admin-login-title">Энциклопедия камней</h1>
            <p class="admin-login-subtitle">Вход в админ-панель</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form class="admin-login-form" method="post">
                <input type="text" class="admin-login-input" name="username" placeholder="Логин" required autocomplete="username">
                <input type="password" class="admin-login-input" name="password" placeholder="Пароль" required autocomplete="current-password">
                <button type="submit" class="admin-login-button">Войти</button>
            </form>
            
            <a href="{{ url_for('welcome') }}" class="back-to-site">← Вернуться на сайт</a>
        </div>
    </div>
</body>
</html>
