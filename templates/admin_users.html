<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи — Админ-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-glass.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: radial-gradient(ellipse at top, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
        }
        
        .admin-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .admin-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        
        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }
        
        .btn-secondary:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
        }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }
        
        .user-form {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .user-form h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            color: var(--text-primary);
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--search-border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--search-bg);
            color: var(--search-text);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--card-hover);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .flash {
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid;
        }
        
        .flash.error {
            border-color: #ef4444;
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
        }
        
        .flash.success {
            border-color: var(--accent-primary);
            color: #6ee7b7;
            background: rgba(16, 185, 129, 0.1);
        }
        
        .user-list {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--divider-color);
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--badge-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .user-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .user-role {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .theme-toggle-floating {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            padding: 0;
            z-index: 1000;
        }
        
        .theme-toggle-floating:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-lg);
            transform: scale(1.1);
        }
        
        .theme-toggle-icon {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <button class="theme-toggle-floating" id="theme-toggle" title="Переключить тему" aria-label="Переключить тему">
        <span class="theme-toggle-icon" id="theme-icon">🌙</span>
    </button>
    
    <div class="admin-page">
        <header class="admin-header">
            <h1 class="admin-title">Пользователи</h1>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Назад</a>
        </header>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="user-form">
            <h2>Создать пользователя</h2>
            <form method="post" action="{{ url_for('admin_create_user') }}">
                <div class="form-group">
                    <label>Имя пользователя *</label>
                    <input type="text" name="username" required placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" name="password" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn btn-primary">➕ Создать</button>
            </form>
        </div>
        
        <div class="user-list">
            {% for user in users %}
            <div class="user-item">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div>
                        <div class="user-name">{{ user.username }}</div>
                        <div class="user-role">Администратор</div>
                    </div>
                </div>
                <form method="post" action="{{ url_for('admin_delete_user', user_id=user.id) }}" onsubmit="return confirm('Удалить пользователя?');">
                    <button type="submit" class="btn btn-danger">🗑️</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const html = document.documentElement;
            
            themeToggle.addEventListener('click', function() {
                const currentTheme = html.getAttribute('data-theme') || 'dark';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                if (newTheme === 'light') {
                    html.setAttribute('data-theme', 'light');
                    themeIcon.textContent = '☀️';
                } else {
                    html.removeAttribute('data-theme');
                    themeIcon.textContent = '🌙';
                }
                
                localStorage.setItem('theme', newTheme);
            });
        });
    </script>
</body>
</html>
